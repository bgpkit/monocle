name: Docker

on:
  push:
    # On merge/push to main → tag as bgpkit/monocle:main
    branches:
      - main
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker.yml"
    # On new version tag → tag as bgpkit/monocle:{version} and bgpkit/monocle:latest
    tags:
      - v[0-9]+.*

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: bgpkit/monocle
          # On branch push to main: type=ref,event=branch → "main"
          # On tag push v1.3.0: type=semver → "1.3.0", "1.3", and "latest"
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
