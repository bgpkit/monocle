name: Docker

on:
  push:
    # On merge/push to main → tag as bgpkit/monocle:main
    branches:
      - main
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker.yml"
    # On new version tag → tag as bgpkit/monocle:{version} and bgpkit/monocle:latest
    tags:
      - v[0-9]+.*

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: bgpkit/monocle
          # On branch push to main: type=ref,event=branch → "main"
          # On tag push v1.3.0: type=semver → "1.3.0", "1.3", and "latest"
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # QEMU enables building for non-native architectures (e.g. arm64 on
      # amd64 runners) via emulation. Slower than native runners but works
      # for a single-job workflow without splitting into a platform matrix.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sync README.md to the Docker Hub repository overview page.
      # NOTE: This uses the Docker Hub API, which requires the account
      # password (not a Personal Access Token). PATs return 403 Forbidden
      # on the Hub API. If DOCKERHUB_TOKEN is a PAT, this step will fail
      # silently (continue-on-error). To enable, set DOCKERHUB_PASSWORD
      # secret and use it here instead of DOCKERHUB_TOKEN.
      - name: Update Docker Hub repo description
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: bgpkit/monocle
          short-description: "Monocle — a commandline application to search, parse, and process BGP information in public sources."
          readme-filepath: ./README.md
